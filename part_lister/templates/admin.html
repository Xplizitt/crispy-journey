<!DOCTYPE html>
<html>
<head>
    <title>Admin - Part Management</title>
</head>
<body>
    <h1>Part Management</h1>
    <p><a href="{{ url_for('logout') }}">Logout</a></p>

    <h2>Add New Part</h2>
    <form action="{{ url_for('add_part') }}" method="post">
        <label for="barcode">Barcode:</label><br>
        <input type="text" name="barcode" id="barcode"><br>
        <label for="description">Description:</label><br>
        <input type="text" name="description" id="description"><br>
        <label for="part_number">Part Number:</label><br>
        <input type="text" name="part_number" id="part_number"><br>
        <label for="uom">Unit of Measure:</label><br>
        <input type="text" name="uom" id="uom"><br>
        <label for="supplier_name">Supplier Name:</label><br>
        <input type="text" name="supplier_name" id="supplier_name"><br><br>
        <input type="submit" value="Add Part">
    </form>

    <hr>

    <h2>Existing Parts</h2>
    <table border="1" cellpadding="5" cellspacing="0">
        <thead>
            <tr>
                <th>Barcode</th>
                <th>Description</th>
                <th>Part Number</th>
                <th>UOM</th>
                <th>Supplier</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for part in parts %}
            <tr>
                <td>{{ part['barcode'] }}</td>
                <td>{{ part['description'] }}</td>
                <td>{{ part['part_number'] }}</td>
                <td>{{ part['uom'] }}</td>
                <td>{{ part['supplier_name'] }}</td>
                <td>
                    <a href="{{ url_for('edit_part', part_id=part['id']) }}">Edit</a>
                    <a href="{{ url_for('delete_part', part_id=part['id']) }}" onclick="return confirm('Are you sure you want to delete this part?');">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        window.onload = function() {
            setupTitleUpdates();
        };
    </script>
</body>
</html>
