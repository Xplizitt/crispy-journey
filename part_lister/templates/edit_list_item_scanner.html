<!DOCTYPE html>
<html>
<head>
    <title>Edit Item - Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 20px; }
        h1 { margin-top: 0; }
        form { margin-top: 20px; }
        input[type="text"] { width: 150px; padding: 5px; }
        input[type="submit"] { padding: 5px 10px; }
    </style>
</head>
<body>

    <h1>Edit Item</h1>

    <p>
        <strong>Barcode:</strong> {{ item.barcode }}<br>
        <strong>Description:</strong> {{ item.description }}
    </p>

    <form method="post">
        <label for="quantity">Quantity:</label><br>
        <input type="text" name="quantity" id="quantity" value="{{ item.quantity }}"><br><br>
        <input type="submit" value="Update Quantity">
    </form>

    <p><a href="{{ url_for('scanner') }}">Back to Scanner</a></p>

</body>
</html>
