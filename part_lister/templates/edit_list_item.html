<!DOCTYPE html>
<html>
<head>
    <title>Edit List Item</title>
</head>
<body>
    <h1>Edit Item Quantity</h1>
    <p>
        <b>Barcode:</b> {{ item['barcode'] }}<br>
        <b>Description:</b> {{ item['description'] }}
    </p>
    <form method="post">
        <label for="quantity">Quantity:</label>
        <input type="text" name="quantity" id="quantity" value="{{ item['quantity'] }}">
        <input type="submit" value="Update Quantity">
    </form>
    <p><a href="{{ url_for('index') }}">Cancel</a></p>
</body>
</html>
