{% extends "base.html" %}

{% block title %}Edit List Item{% endblock %}

{% block content %}
    <h1>Edit Item Quantity</h1>
    <hr>
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">{{ item['description'] }}</h5>
            <h6 class="card-subtitle mb-2 text-muted">Barcode: {{ item['barcode'] }}</h6>
            <form method="post" class="row g-3 align-items-center">
                <div class="col-auto">
                    <label for="quantity" class="form-label">Quantity:</label>
                    <input type="text" class="form-control" name="quantity" id="quantity" value="{{ item['quantity'] }}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Update Quantity</button>
                </div>
            </form>
        </div>
    </div>
    <div class="mt-3">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
    </div>
{% endblock %}
