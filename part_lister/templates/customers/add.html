{% extends 'base.html' %}
{% block title %}Add Customer - Part Lister{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-person-plus"></i> Add Customer</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('customers_bp.create') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="text" class="form-control" id="phone" name="phone">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Address</label>
                        <textarea class="form-control" id="address" name="address" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="4"></textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('customers_bp.index') }}" class="btn btn-secondary" aria-label="Cancel adding customer"><i class="bi bi-x-circle"></i> Cancel</a>
                        <button type="submit" class="btn btn-primary" aria-label="Save new customer"><i class="bi bi-check-circle"></i> Save Customer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
